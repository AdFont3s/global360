<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Global360 Web Tier</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      text-align: center;
      padding: 3rem 4rem;
      border: 1px solid #1e293b;
      border-radius: 12px;
      background: #1e293b;
    }
    h1 { font-size: 2rem; font-weight: 700; letter-spacing: -0.5px; }
    p  { margin-top: 0.75rem; color: #94a3b8; font-size: 1rem; }
    .badge {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      background: #0ea5e9;
      color: #fff;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Global360 Web Tier</h1>
    <p>Auto-healing infrastructure on AWS</p>
    <p>Served by NGINX on Amazon Linux 2023</p>
    <span class="badge">Healthy</span>
  </div>
</body>
</html>
